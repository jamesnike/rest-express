<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>EventConnect Test</title>
</head>
<body style="margin: 0; font-family: Arial;">
    <div style="width: 100%; height: 100vh; background: #3b82f6; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center;">
        <h1>EventConnect Working!</h1>
        <p>JWT Login System Ready</p>
        <button onclick="doLogin()" style="background: white; color: #3b82f6; border: none; padding: 15px 30px; font-size: 18px; border-radius: 8px; cursor: pointer; margin-top: 20px;">Create Demo Account</button>
    </div>
    
    <script>
        console.log('JavaScript is loading');
        
        async function doLogin() {
            console.log('Button clicked');
            try {
                const username = 'demo' + Math.random().toString(36).substr(2, 5);
                console.log('Creating user:', username);
                
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        username: username,
                        password: 'demo123',
                        firstName: 'Demo',
                        lastName: 'User'
                    })
                });
                
                const data = await response.json();
                console.log('Response:', data);
                
                if (data.token) {
                    localStorage.setItem('auth_token', data.token);
                    document.body.innerHTML = '<div style="width: 100%; height: 100vh; background: linear-gradient(135deg, #10b981, #3b82f6); color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; font-family: Arial, sans-serif;"><h1>✅ Login Success!</h1><p>Username: ' + data.user.username + '</p><p>JWT Token Saved!</p><button onclick="location.reload()" style="background: white; color: #10b981; border: none; padding: 15px 30px; font-size: 18px; border-radius: 8px; cursor: pointer; margin-top: 20px;">Continue to App</button></div>';
                } else {
                    alert('Failed: ' + JSON.stringify(data));
                }
            } catch (error) {
                alert('Error: ' + error.message);
                console.error('Login error:', error);
            }
        }
    </script>
</body>
</html>
